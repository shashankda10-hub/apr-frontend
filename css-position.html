<html>
  <head>
    <title>css position</title>
    <style>
      .one {
        height: 300px;
        width: 1000px;
        /*this is an explaination for static and relative*/
        /*position: static;
        top: 150px;
        left: 100px;*/
        border: 2px solid blue;
        background-color: aqua;
      }
      .two {
        height: 300px;
        width: 1000px;
        /* position: fixed;
        top: 300px;
        left: 800px;*/
        position: sticky;
        top: 80px;
        border: 2px solid blue;
        background-color: rgb(211, 172, 17);
      }
      .three {
        height: 300px;
        width: 1000px;
        position: sticky;
        top: 30px;
        border: 2px solid blue;
        background-color: rgb(61, 199, 23);
      }
      .four {
        height: 300px;
        width: 1000px;
        border: 2px solid blue;
        background-color: rgb(117, 14, 168);
      }
      .five {
        height: 300px;
        width: 1000px;
        border: 2px solid blue;
        background-color: rgb(186, 43, 88);
      }
      .six {
        height: 300px;
        width: 1000px;
        border: 2px solid blue;
        background-color: rgb(217, 25, 175);
      }
    </style>
  </head>
  <body>
    <div class="one">one</div>
    <div class="two">two</div>
    <div class="three">three</div>
    <div class="four">four</div>
    <div class="five">five</div>
    <div class="six">six</div>
  </body>
</html>
