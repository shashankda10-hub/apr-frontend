<html>
  <head>
    <title>css text learning</title>
    <style>
      h1 {
        color: blue;
        text-decoration-line: underline overline;
        text-decoration-color: red;
        text-decoration-style: dashed;
        text-decoration-thickness: 5px;
        text-transform: capitalize;
      }
      p {
        text-indent: 30px;
        letter-spacing: 5px;
        word-spacing: 20px;
        line-height: 20px;
      }
    </style>
  </head>
  <body>
    <h1>helo world</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur, adipisicing elit. Eum minus
      obcaecati dolorem dolorum blanditiis vero recusandae iste quidem sed
      tenetur saepe molestias voluptate sint eveniet, labore nemo, excepturi
      animi ipsum.
    </p>
  </body>
</html>
