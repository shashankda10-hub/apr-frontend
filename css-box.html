<html>
  <head>
    <title>css Box</title>
    <style>
      .one {
        height: 300px;
        width: 400px;
        text-align: center;
        border: 2px solid black;
        background-color: aqua;
      }
      .two {
        height: 300px;
        width: 400px;
        border: 2px solid black;
        text-align: center;
        padding: 50px;
        box-sizing: border-box;
        background-color: rgb(15, 188, 87);
      }
    </style>
  </head>
  <body>
    <div class="one">class one</div>
    <div class="two">class two</div>
  </body>
</html>
